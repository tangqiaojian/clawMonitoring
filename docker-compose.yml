services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE=http://127.0.0.1:8000
      - VITE_WS_BASE=ws://127.0.0.1:8000/ws
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
